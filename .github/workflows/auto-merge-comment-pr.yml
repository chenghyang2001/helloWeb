name: 留言 PR 自動合併

on:
  pull_request:
    types: [opened]
    paths:
      - 'comments/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 自動合併留言 PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
