<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello 楊政憲</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
    }

    .project-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    h1 { font-size: 2rem; color: #2d3748; margin-bottom: 8px; }
    h1 .name-first  { color: #667eea; }
    h1 .name-second { color: #e53e3e; }

    #subtitle { font-size: 1rem; color: #718096; margin-bottom: 24px; }

    .clock {
      font-size: 1.5rem;
      font-weight: 600;
      color: #4a5568;
      background: #edf2f7;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    .comment-section label {
      display: block;
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 8px;
    }

    .comment-section input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .comment-section input[type="text"]:focus { border-color: #667eea; }

    .comment-section button {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .comment-section button:hover:not(:disabled) { background: #5a67d8; }
    .comment-section button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 狀態訊息 */
    .status {
      margin-top: 10px;
      font-size: 0.85rem;
      min-height: 1.2em;
      text-align: center;
    }
    .status.loading { color: #718096; }
    .status.error   { color: #e53e3e; }
    .status.success { color: #38a169; }

    /* 留言紀錄 */
    .comment-list { margin-top: 24px; }

    .comment-list h2 {
      font-size: 0.95rem;
      color: #a0aec0;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .comment-list ul { list-style: none; }

    .comment-list li {
      padding: 10px 14px;
      background: #f7fafc;
      border-left: 3px solid #667eea;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #2d3748;
      word-break: break-word;
    }

    .comment-list li .pr-link {
      display: block;
      font-size: 0.78rem;
      color: #667eea;
      margin-top: 4px;
      text-decoration: none;
    }
    .comment-list li .pr-link:hover { text-decoration: underline; }

    /* Token 管理 */
    .token-bar {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #edf2f7;
      font-size: 0.78rem;
      color: #a0aec0;
      text-align: right;
    }
    .token-bar button {
      background: none;
      border: none;
      color: #a0aec0;
      cursor: pointer;
      font-size: 0.78rem;
      text-decoration: underline;
      padding: 0;
    }
    .token-bar button:hover { color: #718096; }

    /* Token 輸入彈窗 */
    .token-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .token-modal.open { display: flex; }
    .token-modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.16);
    }
    .token-modal-box h3 { font-size: 1rem; color: #2d3748; margin-bottom: 8px; }
    .token-modal-box p  { font-size: 0.82rem; color: #718096; margin-bottom: 14px; line-height: 1.5; }
    .token-modal-box input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
      font-family: monospace;
    }
    .token-modal-box input:focus { border-color: #667eea; }
    .token-modal-box .modal-actions { display: flex; gap: 8px; }
    .token-modal-box .modal-actions button {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
    }
    .btn-confirm { background: #667eea; color: #fff; }
    .btn-confirm:hover { background: #5a67d8; }
    .btn-cancel  { background: #edf2f7; color: #4a5568; }
    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
